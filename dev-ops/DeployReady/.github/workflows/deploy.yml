  deploy:
    name: Deploy to Server
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/${{ github.repository }}/kora-app:${{ github.sha }}
            docker stop kora-app || true
            docker rm kora-app || true
            docker run -d --name kora-app -p 80:3000 ghcr.io/${{ github.repository }}/kora-app:${{ github.sha }}  deploy:
