name: Deploy Kora App

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js environment
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install dependencies
        run: npm install --prefix app

      # Run tests
      - name: Run tests
        run: npm test --prefix app

  build_and_push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Docker image with commit SHA tag
      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository }}/kora-app:${{ github.sha }} .

      # Push Docker image
      - name: Push image
        run: docker push ghcr.io/${{ github.repository }}/kora-app:${{ github.sha }}

  deploy:
    name: Deploy to Server
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      # SSH into server and deploy container
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}/kora-app:${{ github.sha }}
            docker stop kora-app || true
            docker rm kora-app || true
            docker run -d --name kora-app -p 80:3000 ghcr.io/${{ github.repository }}/kora-app:${{ github.sha }}
